name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  linux:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image:  ubuntu:24.04
            target: ubuntu-24.04-amd64
          - image:  debian:13
            target: debian-13-amd64
          - image:  archlinux:latest
            target: arch-amd64
    steps:
      - name: Install prereqs
        shell: bash
        run: |
          set -eux
          if command -v apt-get >/dev/null; then
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              build-essential ca-certificates clang cmake curl git tar xz-utils unzip \
              libvulkan-dev \
              libx11-dev libxcursor-dev libxfixes-dev libxrandr-dev libxi-dev
          elif command -v pacman >/dev/null; then
            pacman -Sy --noconfirm
            pacman -S --noconfirm --needed archlinux-keyring
            pacman -Syu --noconfirm --needed \
              base-devel ca-certificates clang cmake curl git tar unzip \
              vulkan-headers vulkan-icd-loader \
              libx11 libxcursor libxfixes libxrandr libxi sdl3
          fi

      - name: Install SDL3
        shell: bash
        run: |
          set -eux
          if command -v pacman >/dev/null; then
            echo "SDL3 provided by the sdl3 package"; exit 0
          fi
          if apt-get install -y --no-install-recommends libsdl3-dev 2>/dev/null; then
            echo "libsdl3-dev installed from apt"; exit 0
          fi
          git clone --depth 1 --branch release-3.2.14 https://github.com/libsdl-org/SDL /tmp/SDL
          cmake -S /tmp/SDL -B /tmp/SDL/build -DCMAKE_BUILD_TYPE=Release -DSDL_TEST_LIBRARY=OFF
          cmake --build /tmp/SDL/build -j"$(nproc)"
          cmake --install /tmp/SDL/build --prefix /usr/local
          ldconfig

      - uses: actions/checkout@v4
        with: { path: ERSaveBackup }

      - uses: actions/checkout@v4
        with:
          repository: BuLEEto/Skald
          path: Skald

      - name: Install Odin
        shell: bash
        run: |
          set -eux
          API="https://api.github.com/repos/odin-lang/Odin/releases/latest"
          ASSET=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "$API" \
                  | grep -Eo '"browser_download_url": *"[^"]+"' | cut -d '"' -f 4 \
                  | grep -i linux | grep -Ei 'amd64|x86_64' | head -n 1)
          curl -fsSL -o /tmp/odin.archive "$ASSET"
          mkdir -p /opt/odin
          case "$ASSET" in
            *.tar.gz|*.tgz) tar -xzf /tmp/odin.archive -C /opt/odin ;;
            *.tar.xz)       tar -xJf /tmp/odin.archive -C /opt/odin ;;
            *.zip)          unzip -q /tmp/odin.archive -d /opt/odin ;;
          esac
          if [ ! -x /opt/odin/odin ]; then
            inner=$(find /opt/odin -maxdepth 2 -name odin -type f -executable | head -n 1)
            [ -n "$inner" ] && cp -r "$(dirname "$inner")"/. /opt/odin/
          fi
          echo "/opt/odin" >> "$GITHUB_PATH"

      - name: Compile Odin vendor libs
        shell: bash
        run: make -C /opt/odin/vendor/stb/src

      - name: Build release binary
        shell: bash
        run: |
          cd ERSaveBackup
          mkdir -p build
          odin build . -collection:gui=../Skald -out:./build/ersavebackup -o:speed -no-bounds-check

      - name: Package
        shell: bash
        run: |
          cd ERSaveBackup/build
          tar -czf ersavebackup-${{ matrix.target }}.tar.gz ersavebackup
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: ERSaveBackup/build/ersavebackup-${{ matrix.target }}.tar.gz

  windows:
    name: Windows amd64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: ERSaveBackup }

      - uses: actions/checkout@v4
        with:
          repository: BuLEEto/Skald
          path: Skald

      - name: Install Odin
        shell: pwsh
        run: |
          $headers = @{ 'Accept' = 'application/vnd.github+json'; 'Authorization' = "Bearer $env:GH_TOKEN" }
          $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/odin-lang/Odin/releases/latest' -Headers $headers
          $asset = $release.assets | Where-Object { ($_.name -match 'windows' -or $_.name -match 'win') -and ($_.name -match 'amd64|x64|x86_64') } | Select-Object -First 1
          $tmp = Join-Path $env:RUNNER_TEMP 'odin.zip'
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $tmp
          New-Item -ItemType Directory -Force -Path 'C:\odin' | Out-Null
          Expand-Archive -Path $tmp -DestinationPath 'C:\odin' -Force
          if (-not (Test-Path 'C:\odin\odin.exe')) {
            $inner = Get-ChildItem 'C:\odin' -Directory | Select-Object -First 1
            if ($inner) {
              Get-ChildItem $inner.FullName -Force | Move-Item -Destination 'C:\odin' -Force
              Remove-Item $inner.FullName -Force -Recurse
            }
          }
          'C:\odin' | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: ilammy/msvc-dev-cmd@v1
        with: { arch: x64 }

      - name: Build release binary
        shell: cmd
        run: |
          cd ERSaveBackup
          if not exist build mkdir build
          odin build . -collection:gui=..\Skald -out:build\ersavebackup.exe -o:speed -no-bounds-check -subsystem:windows
          for /f "delims=" %%I in ('where odin') do set ODIN_EXE=%%I
          for %%I in ("%ODIN_EXE%") do set ODIN_ROOT=%%~dpI
          copy /Y "%ODIN_ROOT%vendor\sdl3\SDL3.dll" build\

      - name: Package
        shell: pwsh
        run: |
          cd ERSaveBackup\build
          Compress-Archive -Path ersavebackup.exe, SDL3.dll -DestinationPath ersavebackup-windows-amd64.zip
          Get-ChildItem

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ERSaveBackup/build/ersavebackup-windows-amd64.zip

  publish:
    name: Publish release
    needs: [linux, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }

      - name: List artefacts
        run: ls -la dist dist/*

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
          body: |
            ## Installing

            Pick the download that matches your system.

            **Linux (x86_64):** extract the tarball and run the binary. You need
            `libSDL3` (≥ 3.2.10) and a Vulkan loader installed — both come from
            recent GPU drivers, or from your distro's `libsdl3` / `vulkan` packages.

            - `ersavebackup-ubuntu-24.04-amd64.tar.gz` — built on Ubuntu 24.04
            - `ersavebackup-debian-13-amd64.tar.gz` — built on Debian 13
            - `ersavebackup-arch-amd64.tar.gz` — built on Arch Linux (rolling)

            Binaries tend to work on any distro newer than the one they were
            built on. If none of them run cleanly for you, clone the repo and
            `./build.sh` — it's a single Odin compile.

            **Windows (x86_64):** extract `ersavebackup-windows-amd64.zip` and run
            `ersavebackup.exe`. `SDL3.dll` is bundled alongside. You need a Vulkan
            loader, which comes with any recent GPU driver — if `vulkaninfo` works
            in a command prompt you're set.

            All builds compiled with `-o:speed -no-bounds-check`.
